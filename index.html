<script type="text/babel">

function getUsage(){try{const r=localStorage.getItem("clr_usage");if(!r)return{count:0,date:new Date().toDateString()};return JSON.parse(r);}catch(_){return{count:0,date:new Date().toDateString()};}}
function incrementUsage(){const today=new Date().toDateString();const u=getUsage();const count=u.date===today?u.count+1:1;try{localStorage.setItem("clr_usage",JSON.stringify({count,date:today}));}catch(_){}return count;}
function todayUsage(){const u=getUsage();if(u.date!==new Date().toDateString())return 0;return u.count;}
function getAgeGateAccepted(){try{return localStorage.getItem("clr_age")==="1";}catch(_){return false;}}
function getToSAccepted(){try{return localStorage.getItem("clr_tos")==="1";}catch(_){return false;}}

const CONTEXTS=[
  {id:"work",  label:"Work",  sub:"meetings, slack, feedback", tone:"Professional, direct, solution-focused. Remove blame and emotion."},
  {id:"dating",label:"Dating",sub:"texts, dates, crushes",     tone:"Warm and genuine. Natural, not desperate. Remove try-hard energy."},
  {id:"social",label:"Social",sub:"friends, in-person chats",  tone:"Conversational, relaxed, human. Short enough to say aloud."},
  {id:"email", label:"Email", sub:"professional messages",     tone:"Polished, one clear ask, no fluff. Professional but not cold."},
];

const ARCHETYPES={
  "over-explainer":{key:"over-explainer",label:"The Over-Sharer",emoji:"📖",color:"#E8A87C",
    tagline:"You lead with empathy, context, and about 40% too many words.",
    traits:["Empathetic","Thorough","Verbose"],
    tip:"Write it all out, then delete the first two sentences.",
    exitStyle:"Give a detailed story-based excuse with names and context. Make it believable because you over-explain naturally. Example: Oh my god, I just got a text — my friend Maya is locked out of her flat and I am literally the only one with a spare key. I am so sorry, I have to run!"},
  terse:{key:"terse",label:"The Clammer",emoji:"🔒",color:"#7C9EBE",
    tagline:"Under pressure you go quiet. What comes out is curt and often misread.",
    traits:["Efficient","Private","Guarded"],
    tip:"Add one warm sentence before your main point.",
    exitStyle:"Give the shortest possible exit. One sentence, no explanation. Example: I have to go. Or: Sorry, something came up. Nothing more."},
  qualifier:{key:"qualifier",label:"The Softener",emoji:"🌿",color:"#8CBE8C",
    tagline:"You wrap every thought in cushions. The point is in there — somewhere.",
    traits:["Considerate","Diplomatic","Hedging"],
    tip:"Lead with the ask. Soften after.",
    exitStyle:"Give a warm apologetic excuse loaded with softeners. Example: I am so sorry, I really hate to do this, but I just remembered I promised to help someone and I would feel terrible letting them down — would you mind if I slipped away?"},
  blunt:{key:"blunt",label:"The Steamroller",emoji:"⚡",color:"#BE9B7C",
    tagline:"You say exactly what you mean — sometimes before checking the moment.",
    traits:["Direct","Decisive","Unfiltered"],
    tip:"Add one line of context before you land the point.",
    exitStyle:"Give a direct unapologetic exit. No story needed. Example: I need to head off. Or: I am going to go now. Delivered with confidence."},
};

const EXIT_CATEGORIES=`
EXIT SITUATIONS — if the user message matches any of these, return exit excuses not rewrites. Set isExit to true.

CATEGORY 1 PHYSICAL DISCOMFORT: bad body odour, bad breath, hygiene issues, standing too close, invading personal space, visibly sick and coughing on them, touched without consent, trapped in a hug too long.

CATEGORY 2 SOCIALLY IMPOSSIBLE: someone extremely drunk or high wants a deep talk, someone mid-meltdown crying in public, someone on verge of a fight looking for argument, stranger venting life story.

CATEGORY 3 WORKPLACE LANDMINES: boss is wrong but wrong moment, colleague taking credit in front of others, someone asking their salary or personal finances, HR asking something needing a lawyer, client being inappropriate.

CATEGORY 4 FAMILY AND RELATIONSHIP TRAPS: relative asking when getting married or having kids, unsolicited parenting or life advice, ex trying to restart closed conversation, family member starting political or religious argument at dinner, asked opinion on terrible partner.

CATEGORY 5 DATING AND SOCIAL AWKWARDNESS: date going badly and need to leave, someone flirting and not interested, friend of friend wont stop talking, someone clearly lying but cannot call it out, being asked to take sides in someone else argument.

CATEGORY 6 DIGITAL TEXT TRAPS: someone sends long rant expecting full response, group chat blowing up and being pulled in, passive aggressive message received, old contact resurfaces wanting something.
`;

const QUIZ=[
  {field:"communicationStyle",q:"When you're stressed, your messages tend to be…",opts:[
    {val:"over-explainer",text:"Long. I explain everything, add context, then add more context."},
    {val:"terse",         text:"Short. Too short. People think I'm annoyed when I'm just stressed."},
    {val:"qualifier",     text:"Full of 'maybe', 'I think', 'just wondering if' — the point gets buried."},
    {val:"blunt",         text:"Direct. Sometimes uncomfortably so."},
  ]},
  {field:"toneDefault",q:"In professional settings, you're usually…",opts:[
    {val:"warm-casual",text:"Warm and friendly — probably too casual for the room."},
    {val:"formal",     text:"Formal and stiff — it can feel impersonal."},
    {val:"passive",    text:"Passive. I hedge a lot."},
    {val:"direct",     text:"Confident — occasionally comes across as blunt."},
  ]},
  {field:"mainTrigger",q:"You're most likely to spiral when…",opts:[
    {val:"conflict",  text:"There's conflict, tension, or I need to give hard feedback."},
    {val:"romantic",  text:"It's romantic or social — stakes feel personal."},
    {val:"authority", text:"I'm talking to someone with power over me."},
    {val:"group",     text:"I'm in a group and feel like I'll be judged."},
  ]},
  {field:"afterSendFeeling",q:"After you hit send, you usually feel…",opts:[
    {val:"overshared",  text:"Immediate regret. Did I say too much?"},
    {val:"underplayed", text:"Worry. Was that too cold or short?"},
    {val:"ruminator",   text:"Fine — until I re-read it three times later."},
    {val:"pre-worry",   text:"Okay. The before is harder than the after."},
  ]},
  {field:"helpGoal",q:"What do you actually want help with?",opts:[
    {val:"brevity",    text:"Saying less. I over-explain and I know it."},
    {val:"warmth",     text:"Saying more. I come across as cold or terse."},
    {val:"confidence", text:"Sounding confident — not apologetic."},
    {val:"tone",       text:"Reading the room and matching my tone to it."},
  ]},
];

function buildPersonality(ans){
  const arch=ARCHETYPES[ans.communicationStyle]||ARCHETYPES.qualifier;
  const tM={"warm-casual":"warm & casual",formal:"formal/stiff",passive:"passive/hedging",direct:"confident & direct"};
  const tgM={conflict:"conflict & feedback",romantic:"romantic situations",authority:"authority figures",group:"group settings"};
  const gM={brevity:"saying less",warmth:"adding warmth",confidence:"sounding confident",tone:"matching tone"};
  const aM={overshared:"oversharing",underplayed:"being too cold",ruminator:"re-reading obsessively","pre-worry":"anticipation"};
  const summary=[
    `Archetype: "${arch.label}" — ${arch.tagline}`,
    `Under stress: ${ans.communicationStyle?.replace("-"," ")}.`,
    `Default tone: ${tM[ans.toneDefault]||ans.toneDefault}.`,
    `Overthinks in: ${tgM[ans.mainTrigger]||ans.mainTrigger}.`,
    `After-send fear: ${aM[ans.afterSendFeeling]||ans.afterSendFeeling}.`,
    `Goal: ${gM[ans.helpGoal]||ans.helpGoal}.`,
    `Tip: ${arch.tip}`,
    `Exit style: ${arch.exitStyle}`,
  ].join(" ");
  return{...ans,archetypeKey:arch.key,archetypeLabel:arch.label,archetypeTagline:arch.tagline,aiPromptSummary:summary,completed:true};
}

const defaultP={communicationStyle:null,toneDefault:null,mainTrigger:null,afterSendFeeling:null,helpGoal:null,archetypeKey:null,completed:false,aiPromptSummary:null};

const AC=createContext(null);
const useApp=()=>useContext(AC);

function AppProvider({children}){
  const [screen,      setScreen]      = useState("gate");
  const [personality, setPersonality] = useState(defaultP);
  const [ctx,         setCtx]         = useState(CONTEXTS[0]);
  const [raw,         setRaw]         = useState("");
  const [result,      setResult]      = useState(null);
  const [loading,     setLoading]     = useState(false);
  const [genError,    setGenError]    = useState(null);
  const [history,     setHistory]     = useState([]);
  const [usageCount,  setUsageCount]  = useState(()=>todayUsage());
  const [showPaywall, setShowPaywall] = useState(false);

  useEffect(()=>{
    try{
      const ageOk=getAgeGateAccepted();
      const tosOk=getToSAccepted();
      if(ageOk&&tosOk){
        const p=localStorage.getItem("clr_p");
        if(p){const j=JSON.parse(p);if(j?.completed){setPersonality(j);setScreen("main");return;}}
        setScreen("splash");
      }
      const h=localStorage.getItem("clr_h");
      if(h)setHistory(JSON.parse(h)||[]);
    }catch(_){}
  },[]);

  const go=useCallback((to)=>setScreen(to),[]);

  const completeOnboarding=useCallback((ans)=>{
    const full=buildPersonality(ans);
    setPersonality(full);
    try{localStorage.setItem("clr_p",JSON.stringify(full));}catch(_){}
    setScreen("reveal");
  },[]);

  const generate=useCallback(async(currentRaw,currentCtx,currentPersonality)=>{
    if(!currentRaw.trim())return;
    const used=todayUsage();
    if(used>=FREE_LIMIT){setShowPaywall(true);return;}
    setResult(null);setGenError(null);setLoading(true);setScreen("output");
    try{
      if(!GROQ_KEY||GROQ_KEY===""){
        setGenError("No API key found. Add your GROQ_KEY to index.html on GitHub.");
        return;
      }
      const arch=ARCHETYPES[currentPersonality.archetypeKey]||ARCHETYPES.qualifier;
      const systemPrompt=[
        "You are Clearly — a witty warm communication filter for overthinkers.",
        "You help people say what they mean clearly, confidently, and sometimes with humour.",
        "",
        `USER PERSONALITY: ${currentPersonality.aiPromptSummary||"General overthinker."}`,
        `USER ARCHETYPE: ${arch.label}`,
        "",
        `CONTEXT: ${currentCtx.label}`,
        `TONE: ${currentCtx.tone}`,
        "",
        "LANGUAGE DETECTION RULE — VERY IMPORTANT:",
        "Detect the language of the user input carefully.",
        "If the user writes in English only — respond in English only.",
        "If the user writes in Hinglish (Hindi and English mixed, or Hindi in Roman script like yaar, kya, matlab, bhai, suno, lagta hai, nahi, haan, theek hai, arre, woh, karna) — respond in Hinglish. Match their vibe. Keep it natural like young urban Indians actually text.",
        "If the user writes in Hindi Devanagari — respond in Hindi.",
        "Never switch languages unless the user switches first.",
        "For Hinglish exits, make them sound natural like: Yaar sorry, mujhe abhi jaana padega.",
        "",
        EXIT_CATEGORIES,
        "",
        "IF EXIT SCENARIO: set isExit true. Give 5 exit excuses matched to user personality.",
        `Exit style for this user: ${arch.exitStyle}`,
        "Each excuse must sound like something this specific person would say. Vary meaningfully. MAX 2 sentences each.",
        "",
        "IF NORMAL REWRITE: set isExit false. Give 5 rewrites.",
        "Be warm, human, occasionally witty. Never robotic or LinkedIn-ish.",
        "Read intention not just words. Soften negatives. Sharpen positives.",
        "Fix their weakness: over-explaining means cut ruthlessly, terse means add warmth, hedging means be direct, blunt means soften.",
        "Each of 5 variations must feel meaningfully different in tone, length, angle. Keep SHORT and punchy.",
        "",
        "RESPOND WITH ONLY RAW JSON. No markdown. No explanation. No code fences:",
        '{"isExit":false,"variations":[{"refined":"text","toneLabel":"A · B · C","explanation":"one line"},{"refined":"text","toneLabel":"A · B · C","explanation":"one line"},{"refined":"text","toneLabel":"A · B · C","explanation":"one line"},{"refined":"text","toneLabel":"A · B · C","explanation":"one line"},{"refined":"text","toneLabel":"A · B · C","explanation":"one line"}]}',
      ].join("\n");

      const res=await fetch("https://api.groq.com/openai/v1/chat/completions",{
        method:"POST",
        headers:{"Content-Type":"application/json","Authorization":`Bearer ${GROQ_KEY}`},
        body:JSON.stringify({
          model:"llama-3.3-70b-versatile",
          messages:[{role:"system",content:systemPrompt},{role:"user",content:currentRaw}],
          max_tokens:3000,temperature:0.9,
        }),
      });
      const data=await res.json();
      if(data.error)throw new Error(data.error.message||"Groq API error");
      const text=data.choices?.[0]?.message?.content||"";
      if(!text)throw new Error("Empty response from Groq");
      let clean=text.replace(/```json|```/g,"").trim();
      let parsed;
      try{parsed=JSON.parse(clean);}
      catch(e){
        const matches=[...clean.matchAll(/\{"refined"\s*:\s*"((?:[^"\\]|\\.)*)"\s*,\s*"toneLabel"\s*:\s*"((?:[^"\\]|\\.)*)"\s*,\s*"explanation"\s*:\s*"((?:[^"\\]|\\.)*)"\s*\}/g)];
        if(matches.length>0){parsed={isExit:clean.includes('"isExit":true'),variations:matches.map(m=>({refined:m[1],toneLabel:m[2],explanation:m[3]}))};
        }else{throw new Error("Response was cut off. Please try again.");}
      }
      const variations=parsed.variations||[parsed];
      const isExit=parsed.isExit||false;
      const newCount=incrementUsage();
      setUsageCount(newCount);
      setResult({variations,currentIndex:0,isExit,...variations[0]});
      setHistory(h=>{
        const entry={id:Date.now(),ctx:currentCtx,raw:currentRaw,refined:variations[0].refined,toneLabel:variations[0].toneLabel,isExit,ts:new Date().toISOString()};
        const u=[entry,...h].slice(0,30);
        try{localStorage.setItem("clr_h",JSON.stringify(u));}catch(_){}
        return u;
      });
    }catch(e){
      setGenError("Something went wrong: "+(e.message||"check your Groq key and try again."));
    }finally{setLoading(false);}
  },[]);

  const reset=useCallback(()=>{
    setPersonality(defaultP);setResult(null);setRaw("");setGenError(null);
    try{localStorage.removeItem("clr_p");}catch(_){}
    setScreen("splash");
  },[]);

  return(
    <AC.Provider value={{screen,go,personality,completeOnboarding,reset,ctx,setCtx,raw,setRaw,result,setResult,loading,genError,generate,history,usageCount,showPaywall,setShowPaywall}}>
      {children}
    </AC.Provider>
  );
}

const D={
  bg:"#0D0C0B",bg2:"#141210",surface:"#1C1917",surf2:"#252119",
  accent:"#D4845A",accentD:"#B86B42",
  exit:"#6B8F71",exitLight:"#1A2B1C",
  cream:"#F0E8DC",cream2:"#B8AC9E",cream3:"#6B6259",
  border:"rgba(240,232,220,0.08)",border2:"rgba(240,232,220,0.04)",
  serif:"'Fraunces',Georgia,serif",sans:"'DM Sans',sans-serif",
};

function PBtn({children,onClick,disabled,style={}}){
  const [h,setH]=useState(false);
  return <button onClick={onClick} disabled={disabled} onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)}
    style={{background:disabled?D.surf2:h?D.accentD:D.accent,color:disabled?D.cream3:"#fff",border:"none",borderRadius:14,padding:"16px 28px",fontFamily:D.sans,fontSize:15,fontWeight:500,cursor:disabled?"not-allowed":"pointer",transition:"all .2s",...style}}>
    {children}
  </button>;
}

function GBtn({children,onClick,style={}}){
  const [h,setH]=useState(false);
  return <button onClick={onClick} onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)}
    style={{background:h?D.surf2:"transparent",color:D.cream2,border:`1px solid ${D.border}`,borderRadius:10,padding:"11px 20px",fontFamily:D.sans,fontSize:13,cursor:"pointer",transition:"all .2s",...style}}>
    {children}
  </button>;
}

function Ambient({color=D.accent}){
  return <div style={{position:"absolute",inset:0,overflow:"hidden",pointerEvents:"none",zIndex:0}}>
    <div style={{position:"absolute",width:500,height:500,borderRadius:"50%",background:`radial-gradient(circle,${color}1A 0%,transparent 70%)`,top:"50%",left:"50%",transform:"translate(-50%,-50%)",animation:"pulse 6s ease-in-out infinite"}}/>
    <div style={{position:"absolute",width:260,height:260,borderRadius:"50%",background:`radial-gradient(circle,${color}0D 0%,transparent 70%)`,top:"12%",right:"8%",animation:"pulse 9s ease-in-out infinite reverse"}}/>
  </div>;
}

function NameEmailForm({onSubmit,submitting,inputBg=D.surface}){
  const [name,setName]=useState("");
  const [email,setEmail]=useState("");
  const valid=name.trim()&&email.includes("@");
  return(
    <div style={{width:"100%"}}>
      <input type="text" value={name} onChange={e=>setName(e.target.value)}
        placeholder="Your name"
        style={{width:"100%",background:inputBg,border:`1px solid ${D.border}`,borderRadius:10,padding:"12px 16px",fontFamily:D.sans,fontSize:14,color:D.cream,outline:"none",marginBottom:8}}
      />
      <input type="email" value={email} onChange={e=>setEmail(e.target.value)}
        placeholder="your@email.com"
        onKeyDown={e=>e.key==="Enter"&&valid&&onSubmit(name,email)}
        style={{width:"100%",background:inputBg,border:`1px solid ${D.border}`,borderRadius:10,padding:"12px 16px",fontFamily:D.sans,fontSize:14,color:D.cream,outline:"none",marginBottom:10}}
      />
      <PBtn onClick={()=>valid&&onSubmit(name,email)} disabled={!valid||submitting} style={{width:"100%"}}>
        {submitting?"Sending…":"Count me in →"}
      </PBtn>
    </div>
  );
}

function AgeGate(){
  const {go}=useApp();
  const [v,setV]=useState(false);
  useEffect(()=>{setTimeout(()=>setV(true),100);},[]);
  const accept=()=>{try{localStorage.setItem("clr_age","1");}catch(_){}go("tos");};
  const decline=()=>{alert("Sorry, Clearly is only available to users aged 13 and above.");};
  return(
    <div style={{position:"relative",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",padding:"40px 28px",textAlign:"center"}}>
      <Ambient/>
      <div style={{position:"relative",zIndex:1,opacity:v?1:0,transform:v?"translateY(0)":"translateY(20px)",transition:"all .6s ease",maxWidth:320,width:"100%"}}>
        <div style={{width:56,height:56,borderRadius:16,background:`linear-gradient(135deg,${D.accent},${D.accentD})`,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 24px",boxShadow:`0 8px 32px ${D.accent}40`}}>
          <span style={{fontSize:26,color:"#fff"}}>✦</span>
        </div>
        <h1 style={{fontFamily:D.serif,fontSize:36,fontWeight:300,color:D.cream,lineHeight:1.15,letterSpacing:"-0.01em",marginBottom:16}}>
          Before you<br/><em style={{fontStyle:"italic",color:D.accent}}>filter…</em>
        </h1>
        <p style={{fontFamily:D.sans,fontSize:15,color:D.cream2,lineHeight:1.65,marginBottom:32}}>
          Clearly is for people aged <strong style={{color:D.cream}}>13 and above.</strong><br/>Are you 13 or older?
        </p>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <PBtn onClick={accept} style={{width:"100%",padding:"16px"}}>Yes, I am 13 or older →</PBtn>
          <GBtn onClick={decline} style={{width:"100%",padding:"14px"}}>No, I am under 13</GBtn>
        </div>
        <p style={{fontFamily:D.sans,fontSize:11,color:D.cream3,marginTop:20,lineHeight:1.6}}>
          By continuing you confirm this app is not therapy, not professional advice, and should be used at your own risk.
        </p>
      </div>
    </div>
  );
}

  const [scrolled,setScrolled]=useState(false);
  const [v,setV]=useState(false);
  const ref=useRef(null);
  useEffect(()=>{setTimeout(()=>setV(true),100);},[]);

  const sections=[

// QUIZ
// ════════════════════════════════════════════════════════
function Quiz(){
  const {completeOnboarding}=useApp();
  const [step,setStep]=useState(0);
  const [answers,setAnswers]=useState({});
  const [sel,setSel]=useState(null);
  const [animIn,setAnimIn]=useState(true);
  const [dir,setDir]=useState(1);
  const total=QUIZ.length;
  const current=QUIZ[step];
  const anim=(d,cb)=>{setAnimIn(false);setDir(d);setTimeout(()=>{cb();setAnimIn(true);},240);};
  const choose=(val)=>{
    setSel(val);
    setTimeout(()=>{
      const a={...answers,[current.field]:val};
      setAnswers(a);
      if(step<total-1){anim(1,()=>{setStep(s=>s+1);setSel(null);});}
      else{completeOnboarding(a);}
    },400);
  };
  const back=()=>{if(!step)return;anim(-1,()=>{const p=step-1;setStep(p);setSel(answers[QUIZ[p].field]||null);});};
  const slide={opacity:animIn?1:0,transform:animIn?"translateX(0)":`translateX(${dir*20}px)`,transition:"opacity .24s ease,transform .24s ease"};
  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%",position:"relative"}}>
      <Ambient/>
      <div style={{position:"relative",zIndex:1,padding:"28px 28px 0",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
          <button onClick={back} style={{background:"none",border:"none",color:step===0?"transparent":D.cream2,cursor:step===0?"default":"pointer",fontFamily:D.sans,fontSize:13,padding:0,transition:"color .2s"}}>← back</button>
          <span style={{fontFamily:D.sans,fontSize:12,color:D.cream3,letterSpacing:"0.04em"}}>{step+1} / {total}</span>
        </div>
        <div style={{height:2,background:D.border,borderRadius:2,overflow:"hidden"}}>
          <div style={{height:"100%",width:`${((step+1)/total)*100}%`,background:D.accent,borderRadius:2,transition:"width .4s ease"}}/>
        </div>
      </div>
      <div style={{flex:1,display:"flex",flexDirection:"column",justifyContent:"center",padding:"32px 28px 28px",position:"relative",zIndex:1}}>
        <div style={slide}>
          <p style={{fontFamily:D.serif,fontSize:26,fontWeight:300,color:D.cream,lineHeight:1.4,marginBottom:32,letterSpacing:"-0.01em"}}>{current.q}</p>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {current.opts.map(opt=>{
              const on=sel===opt.val;
              return(
                <div key={opt.val} onClick={()=>choose(opt.val)}
                  style={{padding:"15px 18px",background:on?`${D.accent}1A`:D.surface,border:`1px solid ${on?D.accent:D.border}`,borderRadius:14,cursor:"pointer",transition:"all .18s",display:"flex",alignItems:"center",gap:14}}>
                  <div style={{width:18,height:18,borderRadius:"50%",border:`1.5px solid ${on?D.accent:D.cream3}`,background:on?D.accent:"transparent",flexShrink:0,transition:"all .18s",display:"flex",alignItems:"center",justifyContent:"center"}}>
                    {on&&<div style={{width:6,height:6,borderRadius:"50%",background:"#fff"}}/>}
                  </div>
                  <span style={{fontFamily:D.sans,fontSize:14,color:on?D.cream:D.cream2,lineHeight:1.5,fontWeight:on?500:400}}>{opt.text}</span>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
}

        <div style={{flex:1,display:"flex",flexDirection:"column",gap:12}}>
          <textarea value={raw} onChange={e=>setRaw(e.target.value.slice(0,MAX))}
            placeholder={"Just start typing, don't overthink it…\n\nI want to tell my manager the deadline isn't realistic but I don't want to seem difficult and maybe I'm wrong but Sarah also hasn't sent the files and…"}
            style={{flex:1,minHeight:180,background:D.surface,border:`1px solid ${D.border}`,borderRadius:16,padding:"18px 20px",fontFamily:D.sans,fontSize:15,color:D.cream,resize:"none",outline:"none",lineHeight:1.7,transition:"border-color .2s",scrollbarWidth:"none"}}
            onFocus={e=>e.target.style.borderColor=`${D.accent}80`}
            onBlur={e=>e.target.style.borderColor=D.border}
          />
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div>
              <span style={{fontFamily:D.sans,fontSize:11,color:D.cream3}}>{raw.length}/{MAX}</span>
              <span style={{fontFamily:D.sans,fontSize:11,color:remaining<=1?D.accent:D.cream3,marginLeft:10}}>
                {remaining} filter{remaining!==1?"s":""} left today
              </span>
            </div>
            <PBtn onClick={handleFilter} disabled={!raw.trim()||remaining===0} style={{padding:"13px 24px",fontSize:14}}>
              Filter it →
            </PBtn>
          </div>
        </div>
      </div>
      <BetaBanner/>
    </div>
  );
}

// ════════════════════════════════════════════════════════
// OUTPUT
// ════════════════════════════════════════════════════════
function Output(){
  const {go,ctx,raw,result,setResult,loading,genError,generate,personality,showPaywall}=useApp();
  const [copied,setCopied]=useState(false);
  const arch=personality.completed?ARCHETYPES[personality.archetypeKey]:null;
  const isExit=result?.isExit||false;
  const copy=async()=>{
    if(!result?.refined)return;
    try{await navigator.clipboard.writeText(result.refined);setCopied(true);setTimeout(()=>setCopied(false),2200);}catch(_){}
  };
  const nextVariation=()=>{
    if(!result?.variations)return;
    const next=(result.currentIndex+1)%result.variations.length;
    const v=result.variations[next];
    setResult({...result,currentIndex:next,...v});
  };
  const total=result?.variations?.length||1;
  const Dots=()=>(
    <div style={{display:"flex",gap:5,justifyContent:"center",marginBottom:18}}>
      {Array.from({length:total}).map((_,i)=>(
        <div key={i} onClick={()=>{const v=result.variations[i];setResult({...result,currentIndex:i,...v});}}
          style={{width:i===result?.currentIndex?18:6,height:6,borderRadius:3,background:i===result?.currentIndex?(isExit?D.exit:D.accent):D.border,transition:"all .25s",cursor:"pointer"}}/>
      ))}
    </div>
  );
  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%",position:"relative"}}>
      {showPaywall&&<Paywall/>}
      <Ambient color={isExit?D.exit:arch?.color||D.accent}/>
      <div style={{position:"relative",zIndex:2,display:"flex",alignItems:"center",justifyContent:"space-between",padding:"22px 24px 0",flexShrink:0}}>
        <button onClick={()=>go("main")} style={{background:"none",border:"none",fontFamily:D.sans,fontSize:13,color:D.cream2,cursor:"pointer",padding:0}}>← Edit</button>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          {isExit&&<span style={{fontSize:11,color:D.exit,fontFamily:D.sans,fontWeight:500,background:`${D.exit}18`,border:`1px solid ${D.exit}40`,borderRadius:20,padding:"2px 10px"}}>Exit mode</span>}
          <span style={{fontFamily:D.sans,fontSize:11,color:D.cream3,textTransform:"uppercase",letterSpacing:"0.06em"}}>{ctx.label}</span>
        </div>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"20px 24px 36px",position:"relative",zIndex:1,scrollbarWidth:"none"}}>
        {loading&&(
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"70%",gap:16}}>
            <div style={{width:36,height:36,borderRadius:"50%",border:`2px solid ${D.border}`,borderTop:`2px solid ${D.accent}`,animation:"spin 1s linear infinite"}}/>
            <p style={{fontFamily:D.sans,fontSize:13,color:D.cream3}}>Filtering your thought…</p>
          </div>
        )}
        {!loading&&genError&&(
          <div style={{padding:24,background:D.surface,borderRadius:16,border:`1px solid ${D.border}`,marginTop:20}}>
            <p style={{fontFamily:D.sans,fontSize:14,color:"#E08080",lineHeight:1.6,marginBottom:16}}>{genError}</p>
            <GBtn onClick={()=>generate(raw,ctx,personality)}>Try again</GBtn>
          </div>
        )}
        {!loading&&!genError&&result&&(
          <div>
            <h2 style={{fontFamily:D.serif,fontSize:26,fontWeight:300,color:D.cream,lineHeight:1.25,letterSpacing:"-0.01em",marginBottom:6}}>
              {isExit?"Here's your escape plan.":<>Here's what to <em style={{fontStyle:"italic",color:D.accent}}>say.</em></>}
            </h2>
            <div style={{display:"inline-flex",alignItems:"center",gap:8,marginBottom:14,marginTop:6}}>
              <div style={{width:6,height:6,borderRadius:"50%",background:isExit?D.exit:"#6BBF8E"}}/>
              <span style={{fontFamily:D.sans,fontSize:12,color:D.cream3}}>{result.toneLabel}</span>
            </div>
            <Dots/>
            <div style={{background:isExit?D.exitLight:`linear-gradient(135deg,${D.surface} 0%,${D.surf2} 100%)`,border:`1px solid ${isExit?D.exit+"40":D.accent+"40"}`,borderRadius:18,padding:"20px 18px",marginBottom:12,boxShadow:`0 4px 24px ${isExit?D.exit:D.accent}15`}}>
              <p style={{fontFamily:D.sans,fontSize:10,color:isExit?D.exit:D.cream3,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:10}}>
                {isExit?"Your exit line":"Filtered version"}
              </p>
              <p style={{fontFamily:D.sans,fontSize:15,color:D.cream,lineHeight:1.8,whiteSpace:"pre-wrap"}}>{result.refined}</p>
            </div>
            {result.explanation&&<p style={{fontFamily:D.sans,fontSize:13,color:D.cream3,lineHeight:1.6,marginBottom:16,fontStyle:"italic"}}>✦ {result.explanation}</p>}
            <div style={{background:D.surface,border:`1px solid ${D.border}`,borderRadius:14,padding:"14px 18px",marginBottom:18}}>
              <p style={{fontFamily:D.sans,fontSize:10,color:D.cream3,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:8}}>Your original</p>
              <p style={{fontFamily:D.sans,fontSize:13,color:D.cream3,lineHeight:1.65,fontStyle:"italic"}}>{raw}</p>
            </div>
            <div style={{display:"flex",gap:10,marginBottom:14}}>
              <PBtn onClick={copy} style={{flex:1,padding:"13px 16px",background:isExit?D.exit:undefined}}>
                {copied?"Copied ✓":"Copy"}
              </PBtn>
              <GBtn onClick={nextVariation} style={{flex:1,padding:"13px 16px"}}>
                Next {isExit?"escape":"version"} →
              </GBtn>
            </div>
            <div style={{textAlign:"center"}}>
              <button onClick={()=>go("main")} style={{background:"none",border:"none",fontFamily:D.sans,fontSize:13,color:D.cream3,cursor:"pointer"}}>
                Start over
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════
// SHELL + APP
// ════════════════════════════════════════════════════════
function Shell(){
  const {screen}=useApp();
  const map={gate:<AgeGate/>,tos:<ToSScreen/>,splash:<Splash/>,quiz:<Quiz/>,reveal:<Reveal/>,main:<Main/>,output:<Output/>};
  return(
    <div style={{width:"100%",height:"100%",background:D.bg,position:"relative",overflow:"hidden"}}>
      <style>{`
        @keyframes pulse{0%,100%{opacity:.6;transform:translate(-50%,-50%) scale(1)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.07)}}
        @keyframes spin{to{transform:rotate(360deg)}}
        @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        *{box-sizing:border-box;}
        textarea,input{scrollbar-width:none;}
        textarea::placeholder{color:#6B6259;font-style:italic;}
        input::placeholder{color:#6B6259;}
        ::-webkit-scrollbar{display:none;}
        button{-webkit-tap-highlight-color:transparent;}
      `}</style>
      {Object.entries(map).map(([k,el])=>(
        <div key={k} style={{position:"absolute",inset:0,opacity:screen===k?1:0,transform:screen===k?"translateY(0)":"translateY(14px)",transition:"opacity .35s ease,transform .35s ease",pointerEvents:screen===k?"all":"none",overflow:"hidden"}}>
          {el}
        </div>
      ))}
    </div>
  );
}

function App(){
  const isMobile=window.innerWidth<=500;
  if(isMobile){
    return <div style={{height:"100vh",width:"100vw",background:D.bg}}><AppProvider><Shell/></AppProvider></div>;
  }
  return(
    <div style={{minHeight:"100vh",background:"#1A1612",display:"flex",alignItems:"center",justifyContent:"center",padding:"20px"}}>
      <div style={{width:400,height:"min(820px,92vh)",background:D.bg,borderRadius:36,overflow:"hidden",boxShadow:"0 32px 80px rgba(0,0,0,0.6),0 0 0 1px rgba(255,255,255,0.06)",position:"relative"}}>
        <AppProvider><Shell/></AppProvider>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
